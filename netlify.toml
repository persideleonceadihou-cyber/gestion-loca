[build]
  command = "git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter && export PATH=$PATH:$HOME/flutter/bin && flutter config --enable-web && flutter pub get && flutter build web --release --base-href /"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
